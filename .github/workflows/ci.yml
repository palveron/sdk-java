name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ['17', '21']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
      - name: Compile
        run: |
          mkdir -p build
          find src -name "*.java" > sources.txt
          javac -d build @sources.txt
      - name: Verify
        run: echo "✅ Compilation successful on Java ${{ matrix.java-version }}"

  publish-note:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - run: echo "✅ Tag ${{ github.ref_name }} — available via JitPack"